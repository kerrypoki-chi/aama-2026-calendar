<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAMA 2026 活動排程行事曆</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F5F7;
  --surface: #FFFFFF;
  --surface-alt: #F0F1F3;
  --border: #E0E2E8;
  --text: #1A1D27;
  --text-muted: #6B7085;
  --text-dim: #9CA0B0;

  /* Department colors */
  --learn: #0e7ee2;
  --learn-bg: rgba(14,126,226,0.08);
  --learn-border: rgba(14,126,226,0.25);
  --create: #e88a20;
  --create-bg: rgba(232,138,32,0.08);
  --create-border: rgba(232,138,32,0.25);
  --good: #5da815;
  --good-bg: rgba(93,168,21,0.08);
  --good-border: rgba(93,168,21,0.25);

  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.06);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Subtle grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

.app { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 32px 24px; }

/* Header */
.header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 40px;
  flex-wrap: wrap;
  gap: 16px;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.logo {
  display: flex;
  align-items: center;
  height: 36px;
}
.logo svg {
  height: 36px;
  width: auto;
}
.header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
.header h1 span { color: var(--text-muted); font-weight: 300; margin-left: 8px; }
.header-actions { display: flex; gap: 10px; }

/* Buttons */
.btn {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px;
  font-weight: 500;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { background: var(--surface-alt); border-color: var(--text-dim); }
.btn-primary { background: var(--learn); border-color: var(--learn); color: #fff; }
.btn-primary:hover { background: #2563EB; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-icon {
  width: 32px; height: 32px; padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 6px; font-size: 16px;
}

/* Stats bar */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 32px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.stat-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.stat-card.total::after { background: linear-gradient(90deg, var(--learn), var(--create), var(--good)); }
.stat-card.learn::after { background: var(--learn); }
.stat-card.create::after { background: var(--create); }
.stat-card.good::after { background: var(--good); }
.stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
.stat-value { font-family: 'Poppins', sans-serif; font-size: 36px; font-weight: 700; }
.stat-card.learn .stat-value { color: var(--learn); }
.stat-card.create .stat-value { color: var(--create); }
.stat-card.good .stat-value { color: var(--good); }

/* View toggle */
.view-controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}
.view-tabs {
  display: flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.view-tab {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px;
  padding: 8px 20px;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
}
.view-tab.active { background: var(--surface-alt); color: var(--text); }
.view-tab:hover:not(.active) { color: var(--text); }

.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-chip {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
}
.filter-chip.active { color: #fff; }
.filter-chip.active[data-dept="共學"] { background: var(--learn-bg); border-color: var(--learn-border); color: var(--learn); }
.filter-chip.active[data-dept="共創"] { background: var(--create-bg); border-color: var(--create-border); color: var(--create); }
.filter-chip.active[data-dept="共好"] { background: var(--good-bg); border-color: var(--good-border); color: var(--good); }
.filter-chip.active[data-dept="all"] { background: var(--surface-alt); color: var(--text); border-color: var(--text-dim); }
.filter-chip.active[data-target] { background: var(--learn); border-color: var(--learn); color: #fff; }
.filter-chip.active[data-target="all"] { background: var(--surface-alt); color: var(--text); border-color: var(--text-dim); }
.filter-chip.active[data-status="已完成"] { background: var(--good); border-color: var(--good); color: #fff; }
.filter-chip.active[data-status="籌備中"] { background: var(--learn); border-color: var(--learn); color: #fff; }
.filter-chip.active[data-status="暫定"] { background: var(--create); border-color: var(--create); color: #fff; }
.filter-chip.active[data-status="all"] { background: var(--surface-alt); color: var(--text); border-color: var(--text-dim); }

/* Calendar grid */
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 32px;
}
.month-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: all 0.25s;
  cursor: pointer;
  position: relative;
  min-width: 0;
  overflow: hidden;
}
.month-card:hover { border-color: var(--text-dim); transform: translateY(-2px); box-shadow: var(--shadow); }
.month-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 16px;
}
.month-name { font-size: 18px; font-weight: 600; }
.month-num { font-family: 'Poppins', sans-serif; font-size: 11px; color: var(--text-dim); }
.month-bars { display: flex; flex-direction: column; gap: 8px; }
.dept-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.dept-label {
  font-size: 12px;
  color: var(--text-muted);
  width: 30px;
  flex-shrink: 0;
}
.dept-bar-track {
  flex: 1;
  height: 8px;
  background: rgba(0,0,0,0.05);
  border-radius: 4px;
  overflow: hidden;
}
.dept-bar {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s cubic-bezier(0.16,1,0.3,1);
  min-width: 0;
}
.dept-bar.learn { background: var(--learn); }
.dept-bar.create { background: var(--create); }
.dept-bar.good { background: var(--good); }
.dept-count {
  font-family: 'Poppins', sans-serif;
  font-size: 12px;
  color: var(--text-dim);
  width: 20px;
  text-align: right;
  flex-shrink: 0;
}

/* Month card event list */
.month-events { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 10px; display: flex; flex-direction: column; gap: 8px; }
.month-event-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text);
  line-height: 1.4;
  padding: 6px 8px;
  background: var(--surface-alt);
  border-radius: 6px;
  min-width: 0;
}
.month-event-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.month-event-dot.learn { background: var(--learn); }
.month-event-dot.create { background: var(--create); }
.month-event-dot.good { background: var(--good); }
.month-event-date { font-family: 'Poppins', sans-serif; font-size: 12px; color: var(--text-muted); width: 40px; flex-shrink: 0; font-weight: 500; }
.month-event-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); font-weight: 500; }
.month-event-status { font-size: 11px; padding: 2px 8px; border-radius: 8px; flex-shrink: 0; font-weight: 500; }

/* Timeline view */
.timeline { display: none; }
.timeline.active { display: block; }
.calendar-grid.hidden { display: none; }

.timeline-month {
  margin-bottom: 24px;
}
.timeline-month-header {
  font-size: 16px;
  font-weight: 600;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.timeline-month-count {
  font-family: 'Poppins', sans-serif;
  font-size: 12px;
  color: var(--text-muted);
}
.timeline-events { display: flex; flex-direction: column; gap: 4px; padding-left: 16px; }
.timeline-event {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  transition: all 0.2s;
  position: relative;
}
.timeline-event:hover { border-color: var(--text-dim); }
.event-dept-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.event-dept-dot.learn { background: var(--learn); }
.event-dept-dot.create { background: var(--create); }
.event-dept-dot.good { background: var(--good); }
.event-date {
  font-family: 'Poppins', sans-serif;
  font-size: 12px;
  color: var(--text-muted);
  width: 80px;
  flex-shrink: 0;
  line-height: 1.5;
}
.event-title { flex: 1; font-size: 14px; }
.event-dept-tag {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 12px;
  flex-shrink: 0;
}
.event-dept-tag.learn { background: var(--learn-bg); color: var(--learn); }
.event-dept-tag.create { background: var(--create-bg); color: var(--create); }
.event-dept-tag.good { background: var(--good-bg); color: var(--good); }
.event-status-tag {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 12px;
  flex-shrink: 0;
}
.event-status-tag.done { background: var(--good-bg); color: var(--good); }
.event-status-tag.preparing { background: var(--learn-bg); color: var(--learn); }
.event-status-tag.tentative { background: var(--create-bg); color: var(--create); }
.event-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }
.timeline-event:hover .event-actions { opacity: 1; }

.empty-state {
  text-align: center;
  padding: 40px;
  color: var(--text-dim);
  font-size: 14px;
}

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(4px);
  z-index: 100;
  align-items: flex-start;
  justify-content: center;
  overflow-y: auto;
  padding: 24px 16px;
  -webkit-overflow-scrolling: touch;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  width: 480px;
  max-width: 100%;
  margin: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,0.15);
  animation: modalIn 0.25s ease;
  flex-shrink: 0;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(16px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.modal h2 { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; letter-spacing: 0.5px; }
.form-group input, .form-group select, .form-group textarea {
  font-family: 'Noto Sans TC', sans-serif;
  width: 100%;
  padding: 8px 12px;
  background: var(--surface-alt);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--learn); }
.form-group textarea { resize: vertical; min-height: 60px; }
.form-group select { cursor: pointer; }
.dept-select-group { display: flex; gap: 8px; }
.dept-option {
  flex: 1;
  padding: 10px;
  text-align: center;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
  background: transparent;
  color: var(--text-muted);
  font-family: 'Noto Sans TC', sans-serif;
}
.dept-option:hover { border-color: var(--text-dim); }
.dept-option.selected.learn { background: var(--learn-bg); border-color: var(--learn-border); color: var(--learn); }
.dept-option.selected.create { background: var(--create-bg); border-color: var(--create-border); color: var(--create); }
.dept-option.selected.good { background: var(--good-bg); border-color: var(--good-border); color: var(--good); }
.btn-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(0, 1fr)); gap: 8px; }
.btn-toggle {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px;
  padding: 8px 6px;
  text-align: center;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
  background: transparent;
  color: var(--text-muted);
}
.btn-toggle:hover { border-color: var(--text-dim); }
.btn-toggle.selected { background: var(--learn-bg); border-color: var(--learn-border); color: var(--learn); }
.btn-toggle.status-done { background: var(--good-bg); border-color: var(--good-border); color: var(--good); }
.btn-toggle.status-preparing { background: var(--learn-bg); border-color: var(--learn-border); color: var(--learn); }
.btn-toggle.status-tentative { background: var(--create-bg); border-color: var(--create-border); color: var(--create); }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 28px; }

/* Year tabs */
.year-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
}
.year-tab {
  font-family: 'Poppins', sans-serif;
  font-size: 15px;
  font-weight: 700;
  padding: 8px 24px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
}
.year-tab:hover { border-color: var(--text-dim); }
.year-tab.active { background: var(--learn); border-color: var(--learn); color: #fff; }

/* Responsive */
@media (max-width: 1024px) {
  .calendar-grid { grid-template-columns: repeat(2, 1fr); }
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .app { padding: 16px 12px; }
  .calendar-grid { grid-template-columns: 1fr; }
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
  .stat-value { font-size: 28px; }
  .header { flex-direction: column; align-items: flex-start; }
  .header h1 { font-size: 22px; }
  .logo svg { height: 28px; }
  .view-controls { flex-direction: column; }
  .filter-chip { font-size: 11px; padding: 5px 10px; }
  .year-tabs { flex-wrap: wrap; }
  .modal { padding: 20px 16px; }
  .modal h2 { font-size: 18px; margin-bottom: 16px; }
  .form-group { margin-bottom: 12px; }
  .dept-select-group { flex-wrap: wrap; }
  .modal-actions { margin-top: 20px; }
  .timeline-event { flex-wrap: wrap; gap: 8px; padding: 10px 12px; }
  .event-date { width: auto; }
  .event-title { min-width: 100%; order: 10; font-size: 13px; }
}
</style>
</head>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js';
import { getFirestore, collection, getDocs, addDoc, doc, updateDoc, deleteDoc, query, orderBy } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDEeJz2Bs-O9SHAR5rEmWkGMwnZKL1xYzQ",
  authDomain: "aama-2026-calendar.firebaseapp.com",
  projectId: "aama-2026-calendar",
  storageBucket: "aama-2026-calendar.firebasestorage.app",
  messagingSenderId: "628776433373",
  appId: "1:628776433373:web:01cb641759904aa27d8d34"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const eventsCol = collection(db, 'events');

const MONTHS = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
const DEPT_CLASS = { '共學': 'learn', '共創': 'create', '共好': 'good' };

let events = [];
let currentYear = 2026;
let currentView = 'grid';
let currentFilter = 'all';
let currentTargetFilter = new Set();
let currentStatusFilter = 'all';
let editingId = null;

async function loadEvents() {
  const snap = await getDocs(query(eventsCol, orderBy('date')));
  events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  render();
}

function getFiltered() {
  let filtered = events.filter(e => new Date(e.date).getFullYear() === currentYear);
  if (currentFilter !== 'all') filtered = filtered.filter(e => e.dept === currentFilter);
  if (currentTargetFilter.size > 0) filtered = filtered.filter(e => {
    const t = Array.isArray(e.target) ? e.target : (e.target ? [e.target] : []);
    return t.some(v => currentTargetFilter.has(v));
  });
  if (currentStatusFilter !== 'all') filtered = filtered.filter(e => e.status === currentStatusFilter);
  return filtered;
}

function renderYearTabs() {
  const years = new Set(events.map(e => new Date(e.date).getFullYear()));
  years.add(2026); // always show 2026
  const sorted = [...years].sort();
  document.getElementById('yearTabs').innerHTML = sorted.map(y =>
    `<button class="year-tab${y === currentYear ? ' active' : ''}" onclick="setYear(${y})">${y}</button>`
  ).join('');
}

function setYear(year) {
  currentYear = year;
  render();
}

function updateStats() {
  const all = events.filter(e => new Date(e.date).getFullYear() === currentYear);
  document.getElementById('totalCount').textContent = all.length;
  document.getElementById('learnCount').textContent = all.filter(e => e.dept === '共學').length;
  document.getElementById('createCount').textContent = all.filter(e => e.dept === '共創').length;
  document.getElementById('goodCount').textContent = all.filter(e => e.dept === '共好').length;
}

function getMonthData() {
  const data = [];
  const filtered = getFiltered();
  const maxPerDept = Math.max(1, ...MONTHS.map((_, m) => {
    return Math.max(
      filtered.filter(e => new Date(e.date).getMonth() === m && e.dept === '共學').length,
      filtered.filter(e => new Date(e.date).getMonth() === m && e.dept === '共創').length,
      filtered.filter(e => new Date(e.date).getMonth() === m && e.dept === '共好').length
    );
  }));

  for (let m = 0; m < 12; m++) {
    const monthEvents = filtered.filter(e => new Date(e.date).getMonth() === m);
    data.push({
      month: m,
      name: MONTHS[m],
      learn: monthEvents.filter(e => e.dept === '共學').length,
      create: monthEvents.filter(e => e.dept === '共創').length,
      good: monthEvents.filter(e => e.dept === '共好').length,
      total: monthEvents.length,
      max: maxPerDept
    });
  }
  return data;
}

function renderGrid() {
  const grid = document.getElementById('calendarGrid');
  const data = getMonthData();
  const filtered = getFiltered();
  grid.innerHTML = data.map(d => {
    const monthEvents = filtered
      .filter(e => new Date(e.date).getMonth() === d.month)
      .sort((a, b) => a.date.localeCompare(b.date) || (a.startTime||'').localeCompare(b.startTime||''));
    const eventList = monthEvents.map(e => {
      const cls = DEPT_CLASS[e.dept];
      const dd = new Date(e.date);
      const ds = `${(dd.getMonth()+1).toString().padStart(2,'0')}/${dd.getDate().toString().padStart(2,'0')}`;
      const statusCls = e.status==='已完成'?'done':e.status==='籌備中'?'preparing':'tentative';
      return `<div class="month-event-item">
        <span class="month-event-dot ${cls}"></span>
        <span class="month-event-date">${ds}</span>
        <span class="month-event-name">${e.name}</span>
        <span class="month-event-status event-status-tag ${statusCls}">${e.status||'籌備中'}</span>
      </div>`;
    }).join('');
    return `
    <div class="month-card" onclick="switchView('timeline');scrollToMonth(${d.month})">
      <div class="month-header">
        <span class="month-name">${d.name}</span>
        <span class="month-num">${d.total} 場</span>
      </div>
      <div class="month-bars">
        <div class="dept-row">
          <span class="dept-label">共學</span>
          <div class="dept-bar-track"><div class="dept-bar learn" style="width:${d.max?d.learn/d.max*100:0}%"></div></div>
          <span class="dept-count">${d.learn}</span>
        </div>
        <div class="dept-row">
          <span class="dept-label">共創</span>
          <div class="dept-bar-track"><div class="dept-bar create" style="width:${d.max?d.create/d.max*100:0}%"></div></div>
          <span class="dept-count">${d.create}</span>
        </div>
        <div class="dept-row">
          <span class="dept-label">共好</span>
          <div class="dept-bar-track"><div class="dept-bar good" style="width:${d.max?d.good/d.max*100:0}%"></div></div>
          <span class="dept-count">${d.good}</span>
        </div>
      </div>
      ${monthEvents.length ? '<div class="month-events">' + eventList + '</div>' : ''}
    </div>`;
  }).join('');
}

function renderTimeline() {
  const container = document.getElementById('timelineView');
  const filtered = getFiltered().sort((a, b) => a.date.localeCompare(b.date) || (a.startTime||'').localeCompare(b.startTime||''));
  let html = '';

  for (let m = 0; m < 12; m++) {
    const monthEvents = filtered.filter(e => new Date(e.date).getMonth() === m);
    html += `<div class="timeline-month" id="month-${m}">
      <div class="timeline-month-header">
        <span>${MONTHS[m]}</span>
        <span class="timeline-month-count">${monthEvents.length} 場活動</span>
      </div>
      <div class="timeline-events">`;

    if (monthEvents.length === 0) {
      html += `<div class="empty-state">尚無活動，點擊右上角新增</div>`;
    } else {
      monthEvents.forEach(e => {
        const cls = DEPT_CLASS[e.dept];
        const d = new Date(e.date);
        const dateStr = (() => {
          const s = `${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}`;
          if (e.endDate && e.endDate !== e.date) {
            const ed = new Date(e.endDate);
            const es = `${(ed.getMonth()+1).toString().padStart(2,'0')}/${ed.getDate().toString().padStart(2,'0')}`;
            return `${s}–${es}`;
          }
          return s;
        })();
        const timeStr = e.startTime ? (e.endTime ? `${e.startTime}–${e.endTime}` : e.startTime) : '';
        html += `<div class="timeline-event">
          <div class="event-dept-dot ${cls}"></div>
          <span class="event-date">${dateStr}${timeStr ? '<br>' + timeStr : ''}</span>
          <span class="event-title">${e.name}${e.type ? ' (' + e.type + ')' : ''}${e.target && (Array.isArray(e.target) ? e.target.length : e.target) ? ' ｜' + (Array.isArray(e.target) ? e.target.join('、') : e.target) : ''}${e.location ? ' 📍' + e.location : ''}${e.note ? ' — ' + e.note : ''}</span>
          <span class="event-dept-tag ${cls}">${e.dept}</span>
          <span class="event-status-tag ${e.status==='已完成'?'done':e.status==='籌備中'?'preparing':'tentative'}">${e.status||'籌備中'}</span>
          <div class="event-actions">
            <button class="btn btn-icon btn-sm" onclick="event.stopPropagation();editEvent('${e.id}')" title="編輯">✎</button>
            <button class="btn btn-icon btn-sm" onclick="event.stopPropagation();deleteEvent('${e.id}')" title="刪除">✕</button>
          </div>
        </div>`;
      });
    }
    html += `</div></div>`;
  }
  container.innerHTML = html;
}

function render() {
  renderYearTabs();
  updateStats();
  renderGrid();
  renderTimeline();
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  const tabs = document.querySelectorAll('.view-tab');
  const grid = document.getElementById('calendarGrid');
  const timeline = document.getElementById('timelineView');
  grid.classList.add('hidden');
  timeline.classList.remove('active');
  if (view === 'grid') { tabs[0].classList.add('active'); grid.classList.remove('hidden'); }
  else { tabs[1].classList.add('active'); timeline.classList.add('active'); }
}

function scrollToMonth(m) {
  setTimeout(() => {
    const el = document.getElementById('month-' + m);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function setFilter(dept) {
  currentFilter = dept;
  document.querySelectorAll('.filter-chip[data-dept]').forEach(c => {
    c.classList.toggle('active', c.dataset.dept === dept);
  });
  render();
}

function setTargetFilter(target) {
  if (target === 'all') {
    currentTargetFilter.clear();
  } else if (currentTargetFilter.has(target)) {
    currentTargetFilter.delete(target);
  } else {
    currentTargetFilter.add(target);
  }
  document.querySelectorAll('.filter-chip[data-target]').forEach(c => {
    if (c.dataset.target === 'all') {
      c.classList.toggle('active', currentTargetFilter.size === 0);
    } else {
      c.classList.toggle('active', currentTargetFilter.has(c.dataset.target));
    }
  });
  render();
}

function setStatusFilter(status) {
  currentStatusFilter = status;
  document.querySelectorAll('.filter-chip[data-status]').forEach(c => {
    c.classList.toggle('active', c.dataset.status === status);
  });
  render();
}

function openModal(id) {
  editingId = id || null;
  document.getElementById('modalTitle').textContent = id ? '編輯活動' : '新增活動';
  document.querySelectorAll('.dept-option').forEach(o => o.classList.remove('selected'));

  if (id) {
    const e = events.find(ev => ev.id === id);
    if (!e) return;
    document.getElementById('eventName').value = e.name;
    document.getElementById('eventDate').value = e.date;
    document.getElementById('eventEndDate').value = e.endDate || '';
    document.getElementById('eventStartTime').value = e.startTime || '';
    document.getElementById('eventEndTime').value = e.endTime || '';
    document.getElementById('eventType').value = e.type || '課程 / 工作坊 / LAB';
    // Restore target buttons (multi-select)
    const targets = Array.isArray(e.target) ? e.target : (e.target ? [e.target] : []);
    document.querySelectorAll('#targetGroup .btn-toggle').forEach(b => {
      b.classList.toggle('selected', targets.includes(b.dataset.value));
    });
    // Restore status button
    const st = e.status || '籌備中';
    document.querySelectorAll('#statusGroup .btn-toggle').forEach(b => {
      const sel = b.dataset.value === st;
      b.classList.toggle('selected', sel);
      b.classList.toggle('status-done', sel && st === '已完成');
      b.classList.toggle('status-preparing', sel && st === '籌備中');
      b.classList.toggle('status-tentative', sel && st === '暫定');
    });
    document.getElementById('eventLocation').value = e.location || '';
    document.getElementById('eventNote').value = e.note || '';
    const deptBtn = document.querySelector(`.dept-option[data-dept="${e.dept}"]`);
    if (deptBtn) deptBtn.classList.add('selected');
  } else {
    document.getElementById('eventName').value = '';
    document.getElementById('eventDate').value = '';
    document.getElementById('eventEndDate').value = '';
    document.getElementById('eventStartTime').value = '';
    document.getElementById('eventEndTime').value = '';
    document.getElementById('eventType').value = '課程 / 工作坊 / LAB';
    document.querySelectorAll('#targetGroup .btn-toggle').forEach(b => b.classList.remove('selected'));
    document.querySelectorAll('#statusGroup .btn-toggle').forEach(b => {
      b.classList.remove('selected', 'status-done', 'status-preparing', 'status-tentative');
    });
    document.getElementById('eventLocation').value = '';
    document.getElementById('eventNote').value = '';
  }
  document.getElementById('modalOverlay').classList.add('active');
  setTimeout(() => document.getElementById('eventName').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  editingId = null;
}

function selectDept(btn) {
  document.querySelectorAll('.dept-option').forEach(o => o.classList.remove('selected'));
  btn.classList.add('selected');
}

function toggleTarget(btn) {
  btn.classList.toggle('selected');
}

function selectStatus(btn) {
  document.querySelectorAll('#statusGroup .btn-toggle').forEach(b => {
    b.classList.remove('selected', 'status-done', 'status-preparing', 'status-tentative');
  });
  btn.classList.add('selected');
  const v = btn.dataset.value;
  btn.classList.add(v === '已完成' ? 'status-done' : v === '籌備中' ? 'status-preparing' : 'status-tentative');
}

async function saveEvent() {
  const name = document.getElementById('eventName').value.trim();
  const date = document.getElementById('eventDate').value;
  const endDate = document.getElementById('eventEndDate').value;
  const startTime = document.getElementById('eventStartTime').value;
  const endTime = document.getElementById('eventEndTime').value;
  const type = document.getElementById('eventType').value;
  const target = Array.from(document.querySelectorAll('#targetGroup .btn-toggle.selected')).map(b => b.dataset.value);
  const statusBtn = document.querySelector('#statusGroup .btn-toggle.selected');
  const status = statusBtn ? statusBtn.dataset.value : '籌備中';
  const location = document.getElementById('eventLocation').value.trim();
  const note = document.getElementById('eventNote').value.trim();
  const deptBtn = document.querySelector('.dept-option.selected');

  if (!name) { alert('請輸入活動名稱'); return; }
  if (!deptBtn) { alert('請選擇所屬部門'); return; }
  if (!date) { alert('請選擇日期'); return; }

  const dept = deptBtn.dataset.dept;

  if (editingId) {
    await updateDoc(doc(db, 'events', editingId), { name, dept, date, endDate, startTime, endTime, type, target, status, location, note });
  } else {
    await addDoc(eventsCol, { name, dept, date, endDate, startTime, endTime, type, target, status, location, note });
  }
  closeModal();
  await loadEvents();
}

function editEvent(id) {
  openModal(id);
}

async function deleteEvent(id) {
  if (!confirm('確定要刪除這個活動嗎？')) return;
  await deleteDoc(doc(db, 'events', id));
  await loadEvents();
}

// Expose functions to window for inline onclick handlers
Object.assign(window, {
  setYear, switchView, scrollToMonth, setFilter, setTargetFilter, setStatusFilter,
  openModal, closeModal, selectDept, toggleTarget, selectStatus,
  saveEvent, editEvent, deleteEvent
});

// Init
loadEvents();
</script>
</body>
</html>
